<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>TP 1 - Gestor de gastos</title>
  </head>
  <body
    class="min-h-screen flex flex-col gap-4 px-4 py-3 font-['Sofia_Sans'] bg-[#F3F0EE]"
  >
    <header class="flex flex-col flex-none gap-2 border-b border-[#14141314] pb-4">
      <h1 class="text-5xl font-bold text-[#141413]">Gestor de gastos</h1>
      <p class="text-lg text-[#555555]">
        Registrá tus gastos y controlá tu dinero.
      </p>
    </header>
    <main class="flex min-h-0 flex-1">
      <section class="w-2/3 pr-4 flex flex-col gap-4">
        <div class="flex flex-none items-center justify-between">
          <div>
            <h2 class="text-2xl font-bold text-[#141413]">Tus gastos</h2>
            <p class="text-[#555555]">
              Acá vas a ver los gastos que vayas cargando.
            </p>
          </div>

          <div class="rounded-full bg-[#FCFBFA] px-5 py-3 flex items-center gap-2">
            <span class="text-sm text-[#555555]">Total:</span>
            <p id="totalGastos" class="text-[#141413] font-bold">$0</p>
          </div>
        </div>

        <div
          id="listaGastos"
          class="flex flex-1 min-h-0 flex-col gap-3 rounded-[20px] bg-[#FCFBFA] p-6 shadow-sm"
        >
          <div
            id="mensajeVacio"
            class="flex flex-1 flex-col items-center justify-center text-center h-full"
          >
            <p class="text-xl font-semibold text-[#141413]">
              Todavía no agregaste gastos
            </p>
            <p class="mt-1 text-[#555555]">
              Completá el formulario para registrar tu primer gasto.
            </p>
          </div>
        </div>
      </section>
      <section class="w-1/3 pl-4 border-l border-[#14141314]">
        <form
          id="formGasto"
          class="flex flex-col gap-4 bg-[#FCFBFA] rounded-[20px] p-6 shadow-sm"
        >
          <h4 class="text-lg ml-1">Ingresá un nuevo gasto</h4>
          <input
            type="text"
            id="nombreGasto"
            placeholder="Nombre del gasto"
            class="w-full rounded-full border border-[#14141314] px-6 py-3 focus:outline-none focus:border-[#141413] focus:border-[1.5px]"
          />
          <input
            type="number"
            id="precioGasto"
            placeholder="Precio del gasto"
            class="w-full rounded-full border border-[#14141314] px-6 py-3 focus:outline-none focus:border-[#141413] focus:border-[1.5px]"
          />
          <div class="w-full flex items-center justify-end gap-2">
            <button
              type="button"
              id="btnBorrar"
              class="bg-[#CF4500] text-white px-6.5 py-2.5 rounded-[20px] cursor-pointer"
            >
              Borrar
            </button>
            <button
              type="submit"
              id="btnCrear"
              class="bg-[#141413] text-[#F3F0EE] px-6.5 py-2.5 rounded-[20px] cursor-pointer"
            >
              Crear
            </button>
          </div>
        </form>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
