<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/png" href="favicon.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>TP 1 - Gestor de gastos</title>
  </head>
  <body
    class="min-h-screen flex flex-col gap-4 px-4 py-3 font-['Sofia_Sans'] bg-[#F3F0EE]"
  >
    <header
      class="flex flex-col flex-none gap-2 border-b border-[#14141314] pb-4"
    >
      <h1 class="text-5xl font-bold text-[#141413]">Gestor de gastos</h1>
      <p class="text-lg text-[#555555]">
        Registrá tus gastos y controlá tu dinero.
      </p>
    </header>
    <main class="flex flex-col-reverse lg:flex-row gap-4 lg:gap-0 min-h-0 flex-1">
      <section class="w-full lg:w-2/3 lg:pr-4 flex flex-col gap-4">
        <div class="flex flex-col sm:flex-row flex-none items-start sm:items-center gap-2 justify-between">
          <div>
            <h2 class="text-2xl font-bold text-[#141413]">Tus gastos</h2>
            <p class="text-[#555555]">
              Acá vas a ver los gastos que vayas cargando.
            </p>
          </div>

          <div class="flex items-center gap-4">
            <div
              class="rounded-full bg-[#FCFBFA] px-5 py-3 flex items-center gap-2 shadow-sm select-none"
            >
              <span class="text-sm text-[#555555]">Gastos:</span>
              <p id="cantidadGastos" class="text-[#141413] font-bold">0</p>
            </div>
            <div
              class="rounded-full bg-[#FCFBFA] px-5 py-3 flex items-center gap-2 shadow-sm select-none"
            >
              <span class="text-sm text-[#555555]">Total:</span>
              <p id="totalGastos" class="text-[#141413] font-bold">$0</p>
            </div>
          </div>
        </div>

        <div
          id="listaGastos"
          class="flex flex-1 min-h-0 flex-col gap-3 rounded-[20px] bg-[#FCFBFA] p-6 shadow-sm"
        >
          <div
            id="mensajeVacio"
            class="flex flex-1 flex-col items-center justify-center text-center h-full"
          >
            <p class="text-2xl font-semibold text-[#141413]">
              Todavía no agregaste gastos
            </p>
            <p class="mt-1 text-[#555555]">
              Completá el formulario para registrar tu primer gasto.
            </p>
          </div>
        </div>
      </section>
      <section class="w-full lg:w-1/3 lg:pl-4 lg:border-l lg:border-[#14141314]">
        <form
          id="formGasto"
          class="flex flex-col gap-4 bg-[#FCFBFA] rounded-[20px] p-6 shadow-sm"
        >
          <h4 class="text-lg ml-1">Ingresá un nuevo gasto</h4>
          <input
            type="text"
            id="nombreGasto"
            placeholder="Nombre del gasto"
            class="w-full rounded-full border border-[#14141314] px-6 py-3 focus:outline-none focus:border-[#141413] focus:border-[1.5px]"
          />
          <input
            type="number"
            id="precioGasto"
            placeholder="Precio del gasto"
            step="any"
            class="w-full rounded-full border border-[#14141314] px-6 py-3 focus:outline-none focus:border-[#141413] focus:border-[1.5px]"
          />
          <div class="relative">
            <select
              id="categoriaGasto"
              class="w-full appearance-none rounded-full border border-[#14141314] px-6 py-3 pr-12 focus:outline-none focus:border-[#141413] focus:border-[1.5px]"
            >
              <option value="Comida">Comida</option>
              <option value="Transporte">Transporte</option>
              <option value="Estudio">Estudio</option>
              <option value="Servicios">Servicios</option>
              <option value="Entretenimiento">Entretenimiento</option>
              <option value="Otros">Otros</option>
            </select>
            <i
              class="fa-solid fa-chevron-down pointer-events-none absolute right-6 top-1/2 -translate-y-1/2 text-sm text-[#141413]"
            ></i>
          </div>
          <div class="w-full flex items-center justify-end gap-2 mt-2">
            <button
              type="button"
              id="btnBorrar"
              class="bg-[#CF4500] text-white px-6.5 py-2.5 rounded-[20px] cursor-pointer"
            >
              Borrar
            </button>
            <button
              type="submit"
              id="btnCrear"
              class="bg-[#141413] text-[#F3F0EE] px-6.5 py-2.5 rounded-[20px] cursor-pointer"
            >
              Crear
            </button>
          </div>
        </form>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
